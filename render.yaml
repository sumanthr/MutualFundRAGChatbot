# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Setup: Render → New → Blueprint → connect GitHub repo → create resources.
# In the dashboard, set secret GROQ_API_KEY when prompted (sync: false below).
#
# After first deploy, open the service Shell and run Phase 1 ingest once so Chroma
# exists on the persistent disk (see docs/deployRenderVercel.md).
#
# Persistent disk requires a paid instance type on Render (e.g. Starter). If you
# use Free tier, remove the `disk` block and expect ephemeral storage (Chroma lost
# on redeploy; OK for experiments only).

services:
  - type: web
    name: mutual-fund-rag-api
    runtime: python
    region: oregon
    plan: starter
    buildCommand: bash scripts/render-build.sh
    startCommand: uvicorn mfr_phase4.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: CHROMA_PATH
        value: /var/data/chroma_data
      - key: THREAD_DB_PATH
        value: /var/data/threads.sqlite3
      - key: CHROMA_COLLECTION
        value: mutual_fund_faq_groww_v1
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      # Cosine distance cutoff; slightly above default helps short queries on the small corpus.
      - key: RETRIEVAL_MAX_DISTANCE
        value: "0.38"
      # Keep embedding model weights on the disk so restarts do not re-download.
      - key: HF_HOME
        value: /var/data/huggingface
      - key: TRANSFORMERS_CACHE
        value: /var/data/huggingface
      - key: SENTENCE_TRANSFORMERS_HOME
        value: /var/data/huggingface
      - key: GROQ_API_KEY
        sync: false
    disk:
      name: mfr-rag-data
      mountPath: /var/data
      sizeGB: 2
