# Render Blueprint — FREE tier (no persistent disk)
# Use: Render → New → Blueprint → select repo → choose this file if prompted,
# or copy these settings when creating a Manual Web Service on the Free plan.
#
# Limitations: Chroma + SQLite live on ephemeral disk — re-run ingest after each
# deploy. Service sleeps after ~15 min idle (slow first request). 512 MB RAM may
# be tight for the first ingest (embedding model download).

services:
  - type: web
    name: mutual-fund-rag-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: bash scripts/render-build.sh
    startCommand: uvicorn mfr_phase4.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: CHROMA_PATH
        value: ./chroma_data
      - key: THREAD_DB_PATH
        value: ./data/threads.sqlite3
      - key: CHROMA_COLLECTION
        value: mutual_fund_faq_groww_v1
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: RETRIEVAL_MAX_DISTANCE
        value: "0.38"
      - key: HF_HOME
        value: ./.cache/huggingface
      - key: TRANSFORMERS_CACHE
        value: ./.cache/huggingface
      - key: SENTENCE_TRANSFORMERS_HOME
        value: ./.cache/huggingface
      - key: GROQ_API_KEY
        sync: false
